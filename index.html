<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
    }

    /* LOCK SCREEN */
    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      letter-spacing: 2px;
      z-index: 10;
    }

    /* MAIN CONTENT */
    #content {
      display: none;
      min-height: 100vh;
      background: url('bg.jpg') no-repeat center center/cover;
      text-align: center;
      padding: 40px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .photos {
      margin: 20px 0;
    }

    .photos img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 20px;
      margin: 10px;
      transition: transform 0.3s;
    }

    .photos img:hover {
      transform: scale(1.1);
    }

    .message {
      max-width: 600px;
      margin: auto;
      font-size: 20px;
      line-height: 1.6;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    /* HEARTS */
    .heart {
      position: fixed;
      bottom: -10px;
      color: pink;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

<div id="lockScreen">
  unlocking at midnight...
</div>

<div id="content">
  <h1>happy birthday ❤️</h1>

  <div class="photos">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <div class="message">
    <p>
      i don’t even know where to start<br><br>

      but i’m really glad i met you<br>
      like genuinely, you make everything feel lighter just by being there<br><br>

      you deserve the softest happiest life ever<br>
      and i hope this year gives you everything you’ve been wanting<br><br>

      i love you ❤️
    </p>
  </div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  function checkTime() {
    const now = new Date();
    const unlockTime = new Date("2026-04-27T00:00:00");

    if (now >= unlockTime) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.body.style.overflow = "auto";

      // try to play music
      const music = document.getElementById("bgMusic");
      music.play().catch(() => {
        console.log("Autoplay blocked, user interaction needed");
      });

      createHearts();
    }
  }

  setInterval(checkTime, 1000);

  function createHearts() {
    setInterval(() => {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }, 300);
  }
</script>

</body>
</html>
