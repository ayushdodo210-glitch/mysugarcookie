<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    font-family: "Times New Roman", Times, serif;
    color: white;
    overflow-x: hidden;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
  }

  h1 {
    text-align: center;
    padding: 60px 20px;
    font-size: 48px;
    font-family: "Times New Roman", Times, serif;
  }

  .section {
    position: relative;
    min-height: 140vh; /* more space = better flow */
    opacity: 0;
    transform: translateY(60px);
    transition: all 1s ease;
  }

  .section.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* BIGGER PHOTOS */
  .photo {
    position: absolute;
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    transition: transform 0.4s;
  }

  .photo:hover {
    transform: scale(1.08) rotate(0deg);
  }

  /* BIGGER TEXT */
  .note {
    position: absolute;
    max-width: 320px;
    background: rgba(0,0,0,0.5);
    padding: 18px;
    border-radius: 18px;
    backdrop-filter: blur(10px);
    font-size: 24px; /* Word size 18 equivalent */
    line-height: 1.6;
  }

  .typewriter::after {
    content: "|";
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .heart {
    position: fixed;
    bottom: -10px;
    color: pink;
    animation: floatUp 6s linear infinite;
  }

  @keyframes floatUp {
    to {
      transform: translateY(-100vh);
      opacity: 0;
    }
  }
</style>
</head>

<body onclick="document.getElementById('bgMusic').play()">

<h1>happy birthday ❤️</h1>

<!-- SECTION -->
<div class="section">
  <img src="photo1.jpg" class="photo" style="top:10%; left:8%; transform:rotate(-8deg);">
  <img src="photo2.jpg" class="photo" style="top:55%; left:60%; transform:rotate(6deg);">
  <div class="note typewriter" data-text="this was one of my favorite moments with you" style="top:30%; left:38%;"></div>
</div>

<div class="section">
  <img src="photo3.jpg" class="photo" style="top:15%; left:65%; transform:rotate(-6deg);">
  <img src="photo4.jpg" class="photo" style="top:65%; left:15%; transform:rotate(10deg);">
  <div class="note typewriter" data-text="you make everything feel lighter" style="top:45%; left:40%;"></div>
</div>

<div class="section">
  <img src="photo5.jpg" class="photo" style="top:10%; left:30%; transform:rotate(5deg);">
  <img src="photo6.jpg" class="photo" style="top:70%; left:65%; transform:rotate(-10deg);">
  <div class="note typewriter" data-text="i’d choose you every single time" style="top:50%; left:10%;"></div>
</div>

<!-- FINAL -->
<div class="section">
  <h1 class="typewriter" data-text="i love you ❤️" style="position:absolute; top:40%; width:100%; text-align:center;"></h1>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
      typeText(entry.target);
    }
  });
}, { threshold: 0.2 });

sections.forEach(sec => observer.observe(sec));

function typeText(section) {
  const elements = section.querySelectorAll('.typewriter');

  elements.forEach(el => {
    if (el.dataset.done) return;

    const text = el.getAttribute('data-text');
    let i = 0;

    function typing() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 30);
      }
    }

    typing();
    el.dataset.done = true;
  });
}

function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
  }, 300);
}
createHearts();
</script>

</body>
</html>
